name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install
      - name: Build Project
        run: |
          bun run build
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><script type="module" src="/assets/index-vFgSHgEL.js"></script></head><body><div id="app"></div></body></html>' > .output/public/index.html

      - name: Deploy to Firebase
        run: bunx firebase-tools deploy --only hosting --project farg-e74ca --token ${{ secrets.FIREBASE_TOKEN }}
