name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Project
        run: bun run build

      - name: Verify build output
        run: |
          if [ ! -f .output/public/index.html ]; then
            echo "❌ index.html not found — prerendering did not run. Check vite.config.ts prerender settings."
            exit 1
          fi
          echo "✅ index.html generated correctly"
          ls -la .output/public

      - name: Deploy to Firebase
        run: bunx firebase-tools deploy --only hosting --project farg-e74ca --token ${{ secrets.FIREBASE_TOKEN }}